<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="cloudGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: rgb(255, 255, 255); stop-opacity: 0.8; --darkreader-inline-stopcolor: var(--darkreader-text-ffffff, #fffdfa);" data-darkreader-inline-stopcolor=""></stop>
      <stop offset="100%" style="stop-color: rgb(212, 230, 241); stop-opacity: 0.4; --darkreader-inline-stopcolor: var(--darkreader-text-d4e6f1, #cdedff);" data-darkreader-inline-stopcolor=""></stop>
    </linearGradient>
    <linearGradient id="sunGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color: rgb(255, 204, 51); stop-opacity: 1; --darkreader-inline-stopcolor: var(--darkreader-text-ffcc33, #ffe443);" data-darkreader-inline-stopcolor=""></stop>
      <stop offset="100%" style="stop-color: rgb(255, 153, 0); stop-opacity: 1; --darkreader-inline-stopcolor: var(--darkreader-text-ff9900, #ffb31d);" data-darkreader-inline-stopcolor=""></stop>
    </linearGradient>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3"></feGaussianBlur>
    </filter>
  </defs>
  <!-- Sun/Atmosphere element -->
  <circle cx="130" cy="70" r="40" fill="url(#sunGrad)"></circle>
  <!-- Glassy Cloud -->
  <path d="M50,140 a30,30 0 0,1 0,-60 a40,40 0 0,1 70,-10 a35,35 0 0,1 40,30 a35,35 0 0,1 -10,70 z" fill="url(#cloudGrad)" stroke="#ffffff" stroke-width="1" style="backdrop-filter: blur(5px); --darkreader-inline-stroke: var(--darkreader-text-ffffff, #fffdfa);" data-darkreader-inline-stroke=""></path>
  <!-- Accent highlight -->
  <path d="M70,95 a25,25 0 0,1 40,-5" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.6" style="--darkreader-inline-stroke: var(--darkreader-text-ffffff, #fffdfa);" data-darkreader-inline-stroke=""></path>
</svg>